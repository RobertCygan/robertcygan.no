<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Steigen Kommune | Tilgang</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        display: grid;
        place-items: center;
        background:
          radial-gradient(900px 500px at 15% 10%, rgba(124, 92, 255, 0.25), transparent 60%),
          radial-gradient(800px 500px at 90% 90%, rgba(255, 93, 143, 0.2), transparent 60%),
          #0c1024;
        color: #f3f5ff;
        font-family: "Manrope", system-ui, -apple-system, sans-serif;
        padding: 24px;
      }
      .gate {
        width: 100%;
        max-width: 420px;
        padding: 36px 32px;
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0)) #161c3a;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 22px;
        box-shadow: 0 22px 50px rgba(2, 6, 23, 0.6);
      }
      .logo {
        display: grid;
        place-items: center;
        width: 56px;
        height: 56px;
        margin: 0 auto 18px;
        border-radius: 18px;
        background: linear-gradient(135deg, #ff5d8f, #7c5cff);
        color: #fff;
        font-weight: 800;
        letter-spacing: 0.04em;
        box-shadow: 0 12px 30px rgba(255, 93, 143, 0.4);
      }
      h1 {
        margin: 0 0 6px;
        text-align: center;
        font-size: 1.45rem;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      p.lead {
        margin: 0 0 24px;
        text-align: center;
        color: #8d95c0;
        font-size: 0.92rem;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: #8d95c0;
        font-size: 0.82rem;
        font-weight: 600;
      }
      .field {
        position: relative;
      }
      input[type="password"] {
        width: 100%;
        height: 48px;
        padding: 0 46px 0 16px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: #f3f5ff;
        font: inherit;
        outline: none;
        transition: 0.2s;
      }
      input[type="password"]:focus {
        border-color: #ff5d8f;
        box-shadow: 0 0 0 4px rgba(255, 93, 143, 0.15);
      }
      .toggle {
        position: absolute;
        top: 50%;
        right: 6px;
        transform: translateY(-50%);
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border: 0;
        background: transparent;
        color: #8d95c0;
        cursor: pointer;
        border-radius: 8px;
      }
      .toggle:hover { color: #fff; }
      .toggle svg { width: 20px; height: 20px; }
      button.submit {
        width: 100%;
        height: 48px;
        margin-top: 16px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(135deg, #ff5d8f, #7c5cff);
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 14px 30px rgba(124, 92, 255, 0.35);
        transition: 0.2s;
      }
      button.submit:hover { transform: translateY(-1px); }
      button.submit:active { transform: translateY(0); }
      .error {
        margin-top: 12px;
        padding: 10px 14px;
        background: rgba(255, 107, 107, 0.12);
        border: 1px solid rgba(255, 107, 107, 0.3);
        border-radius: 10px;
        color: #ff9b9b;
        font-size: 0.86rem;
        display: none;
      }
      .error.show { display: block; }
      .hint {
        margin: 18px 0 0;
        text-align: center;
        color: #6b7299;
        font-size: 0.78rem;
      }
      .back {
        display: block;
        margin-top: 20px;
        text-align: center;
        color: #8d95c0;
        text-decoration: none;
        font-size: 0.85rem;
      }
      .back:hover { color: #fff; }
    </style>
  </head>
  <body>
    <main class="gate">
      <div class="logo">SK</div>
      <h1>Steigen Kommune</h1>
      <p class="lead">Økonomi og demografi – beskyttet område</p>
      <form id="gateForm" autocomplete="off">
        <label for="pw">Passord</label>
        <div class="field">
          <input
            id="pw"
            name="pw"
            type="password"
            placeholder="Skriv inn passord"
            autofocus
            required
            aria-describedby="error"
          />
          <button type="button" class="toggle" id="toggle" aria-label="Vis passord">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <button type="submit" class="submit">Logg inn</button>
        <div id="error" class="error" role="alert">Feil passord. Prøv igjen.</div>
      </form>
      <p class="hint">Trykk Enter for å bekrefte.</p>
      <a class="back" href="../index.html">← Tilbake til robertcygan.no</a>
    </main>

    <script>
      (function () {
        var EXPECTED = "$teigen2026";
        var form = document.getElementById("gateForm");
        var input = document.getElementById("pw");
        var error = document.getElementById("error");
        var toggle = document.getElementById("toggle");

        if (sessionStorage.getItem("steigen-auth") === "ok") {
          window.location.replace("./dashboard.html");
          return;
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          if (input.value === EXPECTED) {
            sessionStorage.setItem("steigen-auth", "ok");
            window.location.replace("./dashboard.html");
          } else {
            error.classList.add("show");
            input.value = "";
            input.focus();
          }
        });

        toggle.addEventListener("click", function () {
          var isPw = input.type === "password";
          input.type = isPw ? "text" : "password";
          toggle.setAttribute("aria-label", isPw ? "Skjul passord" : "Vis passord");
        });
      })();
    </script>
  </body>
</html>
