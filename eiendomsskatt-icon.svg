<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Eiendomsskatt Assistent">
  <defs>
    <linearGradient id="eiBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="eiGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0CD68"/>
      <stop offset="100%" stop-color="#C9A961"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="22" fill="url(#eiBg)"/>
  <rect x="2" y="2" width="124" height="124" rx="20" fill="none" stroke="url(#eiGold)" stroke-width="1.5" opacity="0.55"/>
  <!-- house silhouette -->
  <path d="M 32 60 L 64 34 L 96 60 L 96 96 L 32 96 Z" fill="none" stroke="url(#eiGold)" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- door -->
  <rect x="58" y="74" width="12" height="22" fill="url(#eiGold)" opacity="0.18"/>
  <rect x="58" y="74" width="12" height="22" fill="none" stroke="url(#eiGold)" stroke-width="1.4"/>
  <!-- window -->
  <rect x="40" y="66" width="12" height="10" fill="none" stroke="url(#eiGold)" stroke-width="1.2"/>
  <rect x="76" y="66" width="12" height="10" fill="none" stroke="url(#eiGold)" stroke-width="1.2"/>
  <!-- checklist tick badge in corner -->
  <circle cx="94" cy="36" r="14" fill="#0a0a0a" stroke="url(#eiGold)" stroke-width="1.6"/>
  <polyline points="86,37 92,43 102,31" fill="none" stroke="url(#eiGold)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- § symbol -->
  <text x="64" y="118" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="14" fill="url(#eiGold)" letter-spacing="3" font-weight="600">§ E-SKATT</text>
</svg>
